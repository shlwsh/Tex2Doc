id = "jos-paper-toml"
display_name = "IEEE/JOS Paper"
aliases = ["jos-paper"]

document_classes = ["IEEEtran"]

[page_setup]
kind = "a4"
width_mm = 210.0
height_mm = 297.0
margin_top_mm = 19.1
margin_bottom_mm = 19.1
margin_left_mm = 17.78
margin_right_mm = 17.78

[font_policy]
latin_main = "Times New Roman"
notes = "10pt"

[caption_policy]
figure_prefix = "Fig."
table_prefix = "Table"
equation_prefix = ""
numbering = "arabic"

[citation_policy]
style = "ieee"
bibliography_style = "ieee"
reference_section_title = "References"

[detection]
min_confidence = 0.75
fallback_profile = "generic"

[[detection.signals]]
kind = "documentclass"
value = "IEEEtran"
weight = 0.70

[[detection.signals]]
kind = "documentclass_option"
value = "journal"
weight = 0.20

[[detection.signals]]
kind = "macro"
value = "IEEEauthorblockN"
weight = 0.10

[[detection.signals]]
kind = "macro"
value = "IEEEkeywords"
weight = 0.05

[backend]
preferred = "luatex-node"
fallback = ["xelatex-hook", "rule-based"]
requires_xetex = false
prefers_luatex = true

[semantic_policy]
unknown_macro = "rule-engine"
preserve_raw_fallback = true
collect_runtime_events = true
collect_layout_graph = true

# IEEE/JOS-specific macro rules
[[macro_rules]]
name = "IEEEauthorblockN"
semantic = "author"
args = 1
style = ""

[[macro_rules]]
name = "IEEEauthorblockA"
semantic = "affiliation"
args = 1
style = ""

[[macro_rules]]
name = "IEEEkeywords"
semantic = "keyword"
args = 1
style = ""

[[macro_rules]]
name = "markboth"
semantic = "metadata"
args = 2
style = ""

[[macro_rules]]
name = "IEEEpeerreviewmaketitle"
semantic = "metadata"
args = 0
style = ""

[[macro_rules]]
name = "citet"
semantic = "citation"
args = 1
style = "textual"

[[macro_rules]]
name = "citep"
semantic = "citation"
args = 1
style = "parenthetical"

[[style_map]]
semantic = "heading.level1"
docx_style = "Heading1"

[[style_map]]
semantic = "heading.level2"
docx_style = "Heading2"

[[style_map]]
semantic = "paragraph.body"
docx_style = "BodyText"

[[style_map]]
semantic = "caption.figure"
docx_style = "Caption"

[quality]
min_compatibility_score = 75
max_raw_fallback_blocks = 10
require_reference_graph = true
