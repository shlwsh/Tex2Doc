id = "tacl"
display_name = "ACL/TACL Paper"

document_classes = ["acl"]
aliases = ["acl-paper", "tacl"]

[page_setup]
kind = "letter"
columns = 2

[font_policy]
latin_main = "Times New Roman"
cjk_main = ""
math = "Cambria Math"
notes = "ACL/TACL Word-compatible fallback"

[caption_policy]
figure_prefix = "Figure"
table_prefix = "Table"
equation_prefix = ""
numbering = "arabic"

[citation_policy]
style = "author-year"
bibliography_style = "acl_natbib"
reference_section_title = "References"
supports_natbib = true
supports_biblatex = false

[detection]
min_confidence = 0.75
fallback_profile = "generic"

[[detection.signals]]
kind = "documentclass"
value = "acl"
weight = 0.70

[[detection.signals]]
kind = "documentclass_option"
value = "aclang"
weight = 0.20

[[detection.signals]]
kind = "macro"
value = "aclfinalcopy"
weight = 0.10

[[detection.signals]]
kind = "package"
value = "natbib"
weight = 0.05

[backend]
preferred = "luatex-node"
fallback = ["xelatex-hook", "rule-based"]
requires_xetex = false
prefers_luatex = true

[semantic_policy]
unknown_macro = "rule-engine"
preserve_raw_fallback = true
collect_runtime_events = true
collect_layout_graph = true

# ACL/TACL-specific macro rules
[[macro_rules]]
name = "citet"
semantic = "citation"
args = 1
style = "textual"

[[macro_rules]]
name = "citep"
semantic = "citation"
args = 1
style = "parenthetical"

[[macro_rules]]
name = "citealp"
semantic = "citation"
args = 1
style = "textual-no-parens"

[[macro_rules]]
name = "aclfinalcopy"
semantic = "metadata"
args = 0
style = ""

[[macro_rules]]
name = "aclpaperid"
semantic = "metadata"
args = 0
style = ""

[[macro_rules]]
name = "shorttitle"
semantic = "metadata"
args = 1
style = ""

[[macro_rules]]
name = "name"
semantic = "author"
args = 1
style = ""

[[macro_rules]]
name = "address"
semantic = "affiliation"
args = 1
style = ""

[[style_map]]
semantic = "heading.level1"
docx_style = "Heading1"

[[style_map]]
semantic = "heading.level2"
docx_style = "Heading2"

[[style_map]]
semantic = "paragraph.body"
docx_style = "BodyText"

[[style_map]]
semantic = "caption.figure"
docx_style = "Caption"

[[style_map]]
semantic = "bibliography.item"
docx_style = "Bibliography"

[quality]
min_compatibility_score = 75
max_raw_fallback_blocks = 10
require_reference_graph = true
