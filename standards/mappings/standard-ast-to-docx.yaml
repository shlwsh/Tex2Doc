schema_version: "0.1"
target_format: docx
profile_styles:
  # 8 个用户确认需覆盖的 JOS 样式目标
  heading_by_level:
    style_map:
      "1": JOSHeading1
      "2": JOSHeading2
      "3": JOSHeading3
  body: JOSBody
  abstract_zh: JOSAbstractZh
  abstract_en: JOSAbstractEn
  keywords: JOSKeywords
  reference: JOSReference
  list_bullet: ListBullet
  list_number: ListNumber
  figure_caption: JOSCaption
  table_caption: JOSCaption
  table_text: JOSTableText
  code: JOSCode
  algorithm: JOSCode
  equation: JOSCode
  front_matter_title_zh: JOSTitleZh
  front_matter_title_en: JOSEnglishTitle
  front_matter_author: JOSAuthorZh
  front_matter_institute: JOSInstituteZh
rules:
  - id: map.heading.docx
    source_ast_kind: Heading
    target_render_node: Paragraph
    style_from_profile: heading_by_level
    version: "0.1"
  - id: map.paragraph.docx
    source_ast_kind: Paragraph
    target_render_node: Paragraph
    style_from_profile: body
    version: "0.1"
  - id: map.abstract.zh.docx
    source_ast_kind: Paragraph
    target_render_node: Paragraph
    style_from_profile: abstract_zh
    version: "0.1"
  - id: map.abstract.en.docx
    source_ast_kind: Paragraph
    target_render_node: Paragraph
    style_from_profile: abstract_en
    version: "0.1"
  - id: map.keywords.docx
    source_ast_kind: Paragraph
    target_render_node: Paragraph
    style_from_profile: keywords
    version: "0.1"
  - id: map.list.bullet.docx
    source_ast_kind: List
    target_render_node: ParagraphList
    style_from_profile: list_bullet
    version: "0.1"
  - id: map.list.number.docx
    source_ast_kind: List
    target_render_node: ParagraphList
    style_from_profile: list_number
    version: "0.1"
  - id: map.figure.caption.docx
    source_ast_kind: Figure
    target_render_node: Paragraph
    style_from_profile: figure_caption
    version: "0.1"
  - id: map.table.caption.docx
    source_ast_kind: Table
    target_render_node: Paragraph
    style_from_profile: table_caption
    version: "0.1"
  - id: map.table.docx
    source_ast_kind: Table
    target_render_node: Table
    style_from_profile: table_text
    version: "0.1"
  - id: map.algorithm.docx
    source_ast_kind: Algorithm
    target_render_node: Table
    style_from_profile: algorithm
    version: "0.1"
  - id: map.equation.docx
    source_ast_kind: Equation
    target_render_node: Paragraph
    style_from_profile: equation
    version: "0.1"
  - id: map.bibliography.docx
    source_ast_kind: Bibliography
    target_render_node: ParagraphList
    style_from_profile: reference
    version: "0.1"
  - id: map.text.docx
    source_inline_kind: Text
    target_render_node: Run
    rule_type: inline
    version: "0.1"
  - id: map.citation.docx
    source_inline_kind: Citation
    target_render_node: Run
    run_properties:
      vertical_align: superscript
    rule_type: inline
    version: "0.1"
  - id: map.crossref.docx
    source_inline_kind: CrossRef
    target_render_node: Run
    rule_type: inline
    version: "0.1"
  - id: map.math.inline.docx
    source_inline_kind: MathInline
    target_render_node: Run
    rule_type: inline
    version: "0.1"
  - id: map.link.docx
    source_inline_kind: Link
    target_render_node: Hyperlink
    rule_type: inline
    version: "0.1"
  - id: opc.relationship.image
    target_render_node: Relationship
    relationship_rule: opc.relationship.image
    rule_type: resource
    version: "0.1"
