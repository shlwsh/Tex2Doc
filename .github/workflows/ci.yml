name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]
    steps:
      - name: Configure git line endings
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libinput-dev \
            postgresql \
            postgresql-contrib

      - name: Start PostgreSQL test database
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres createdb -O postgres docdb || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: |
          cargo test --workspace --all-targets --exclude doc-server -- --test-threads=1
          cargo test -p doc-server --lib --bin doc-server -- --test-threads=1

      - name: doc-server API integration tests
        if: matrix.os == 'ubuntu-latest'
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/docdb
        run: cargo test -p doc-server --test api -- --test-threads=1

      - name: End-to-end artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p artifacts
          cp crates/core/tests/output/hello.docx artifacts/hello.docx 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest'
        with:
          name: hello-docx
          path: artifacts/hello.docx
          if-no-files-found: ignore

  flutter:
    name: Flutter web/client checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Flutter analyze
        working-directory: flutter_app
        run: flutter analyze

      - name: Flutter test
        working-directory: flutter_app
        run: flutter test
