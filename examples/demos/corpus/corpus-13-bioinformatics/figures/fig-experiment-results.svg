<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="150" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#495057">
    Experiment Results
  </text>
  <line x1="50" y1="150" x2="250" y2="150" stroke="#495057" stroke-width="1"/>
  <line x1="50" y1="150" x2="50" y2="50" stroke="#495057" stroke-width="1"/>
  <text x="30" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057" transform="rotate(-90, 30, 100)">Accuracy (%)</text>
  <text x="150" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Epoch</text>
  <polyline points="60,140 100,120 140,100 180,80 220,60 260,50" fill="none" stroke="#0d6efd" stroke-width="2"/>
  <polyline points="60,145 100,130 140,115 180,95 220,75 260,65" fill="none" stroke="#198754" stroke-width="2"/>
  <circle cx="60" cy="140" r="3" fill="#0d6efd"/>
  <circle cx="260" cy="50" r="3" fill="#0d6efd"/>
</svg>
