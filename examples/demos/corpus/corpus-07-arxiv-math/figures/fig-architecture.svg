<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <rect width="400" height="250" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="200" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#495057">
    Figure 1: System Architecture
  </text>
  <rect x="50" y="110" width="80" height="40" fill="#e9ecef" stroke="#495057" stroke-width="1" rx="3"/>
  <text x="90" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Input</text>
  <rect x="160" y="110" width="80" height="40" fill="#dee2f5" stroke="#495057" stroke-width="1" rx="3"/>
  <text x="200" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Encoder</text>
  <rect x="270" y="110" width="80" height="40" fill="#d4edda" stroke="#495057" stroke-width="1" rx="3"/>
  <text x="310" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Output</text>
  <path d="M130 130 L160 130" stroke="#495057" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M240 130 L270 130" stroke="#495057" stroke-width="1" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#495057"/>
    </marker>
  </defs>
</svg>
