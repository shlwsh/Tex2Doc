<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180">
  <rect width="400" height="180" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#495057">
    Dataset Overview
  </text>
  <rect x="40" y="50" width="100" height="100" fill="#e9ecef" stroke="#495057" stroke-width="1" rx="5"/>
  <text x="90" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Training</text>
  <text x="90" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6c757d">N=10,000</text>
  <rect x="160" y="50" width="100" height="100" fill="#e9ecef" stroke="#495057" stroke-width="1" rx="5"/>
  <text x="210" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Validation</text>
  <text x="210" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6c757d">N=2,000</text>
  <rect x="280" y="50" width="80" height="100" fill="#e9ecef" stroke="#495057" stroke-width="1" rx="5"/>
  <text x="320" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#495057">Test</text>
  <text x="320" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6c757d">N=2,000</text>
</svg>
